<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GB Watch — Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 480px;
      margin: 40px auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      padding: 28px 32px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 24px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 span.icon { font-size: 20px; }
    .field {
      margin-bottom: 20px;
    }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-weight: 500;
    }
    label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .field-row label {
      font-weight: 500;
    }
    select {
      padding: 6px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      font-size: 13px;
      background: #fff;
      cursor: pointer;
    }
    .desc {
      font-size: 12px;
      color: #666;
      margin: 4px 0 0 26px;
    }
    .save-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 28px;
    }
    button {
      padding: 8px 20px;
      background: #2d6a4f;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #245a41; }
    #status {
      font-size: 12px;
      color: #2d6a4f;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">⌨️</span> GB Watch — Options</h1>

    <div class="field">
      <label>
        <input type="checkbox" id="notificationsEnabled" />
        Enable push notifications
      </label>
      <p class="desc">Show a Chrome notification when a watched item changes status.</p>
    </div>

    <div class="field-row">
      <label for="pollInterval">Polling interval</label>
      <select id="pollInterval">
        <option value="15">Every 15 minutes</option>
        <option value="30" selected>Every 30 minutes</option>
        <option value="60">Every 60 minutes</option>
      </select>
    </div>

    <div class="save-row">
      <button id="saveBtn">Save</button>
      <span id="status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
