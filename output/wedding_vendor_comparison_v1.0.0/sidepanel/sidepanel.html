<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Vendor Tracker</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <!-- Header -->
  <header class="sp-header">
    <div class="sp-header-title">
      <span class="sp-icon">&#128141;</span>
      <span>Wedding Vendor Tracker</span>
    </div>
    <div class="sp-header-actions">
      <button class="sp-btn-icon" id="sp-export-btn" title="Export CSV">&#8659; CSV</button>
      <button class="sp-btn-icon" id="sp-settings-btn" title="Settings">&#9881;</button>
    </div>
  </header>

  <!-- View toggle: List | Compare (Pro) -->
  <div class="sp-tabs">
    <button class="sp-tab sp-tab--active" data-tab="list">My Vendors</button>
    <button class="sp-tab sp-tab--pro" data-tab="compare" id="sp-tab-compare">
      Compare &#9733;Pro
    </button>
  </div>

  <!-- Filter bar -->
  <div class="sp-filter-bar">
    <select id="sp-filter-category">
      <option value="">All Categories</option>
    </select>
    <select id="sp-filter-status">
      <option value="">All Statuses</option>
      <option value="Contacted">Contacted</option>
      <option value="Quoted">Quoted</option>
      <option value="Booked">Booked</option>
      <option value="Rejected">Rejected</option>
    </select>
  </div>

  <!-- Vendor list view -->
  <div id="sp-view-list" class="sp-view">
    <div id="sp-empty-state" class="sp-empty" style="display:none">
      <div class="sp-empty-icon">&#128141;</div>
      <p>No vendors tracked yet.</p>
      <p class="sp-empty-sub">Visit The Knot or WeddingWire and click <strong>"+ Track Vendor"</strong> on any listing.</p>
    </div>
    <div id="sp-vendor-list" class="sp-vendor-list"></div>
  </div>

  <!-- Compare view (Pro) -->
  <div id="sp-view-compare" class="sp-view" style="display:none">
    <!-- Category selector for comparison -->
    <div class="sp-compare-controls">
      <label for="sp-compare-category">Compare category:</label>
      <select id="sp-compare-category"></select>
    </div>
    <div id="sp-compare-table-wrap" class="sp-compare-table-wrap"></div>
  </div>

  <!-- Vendor detail sheet (slide-in) -->
  <div id="sp-vendor-detail" class="sp-vendor-detail sp-detail-hidden">
    <div class="sp-detail-header">
      <button class="sp-back-btn" id="sp-back-btn">&#8592; Back</button>
      <button class="sp-delete-btn" id="sp-delete-btn" title="Remove vendor">&#128465;</button>
    </div>
    <div id="sp-detail-body" class="sp-detail-body"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
