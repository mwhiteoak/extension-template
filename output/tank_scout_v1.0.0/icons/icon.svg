<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1d4ed8"/>

  <!-- Water waves -->
  <ellipse cx="64" cy="90" rx="46" ry="22" fill="#1e40af" opacity="0.6"/>

  <!-- Fish body -->
  <ellipse cx="60" cy="60" rx="30" ry="18" fill="#93c5fd"/>

  <!-- Fish tail -->
  <polygon points="88,60 102,45 102,75" fill="#60a5fa"/>

  <!-- Fish eye -->
  <circle cx="40" cy="56" r="5" fill="white"/>
  <circle cx="41" cy="55" r="3" fill="#1e3a5f"/>

  <!-- Fish fin (dorsal) -->
  <path d="M55,44 Q64,32 74,42" stroke="#60a5fa" stroke-width="3" fill="none"/>

  <!-- Magnifier glass handle -->
  <line x1="92" y1="88" x2="106" y2="102" stroke="#fbbf24" stroke-width="5" stroke-linecap="round"/>

  <!-- Magnifier lens ring -->
  <circle cx="84" cy="80" r="16" fill="none" stroke="#fbbf24" stroke-width="5"/>

  <!-- Magnifier lens glint -->
  <circle cx="78" cy="73" r="4" fill="white" opacity="0.5"/>
</svg>
