<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triathlon Pacing Planner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-icon">🏊 🚴 🏃</div>
    <div>
      <div class="header-title">Race Day Planner</div>
      <div class="header-sub">Triathlon Pacing Planner</div>
    </div>
  </div>

  <div class="body">
    <div class="status-section" id="statusSection">
      <div class="status-row">
        <span class="status-label">Paces saved</span>
        <span class="status-val" id="pacesSaved">No</span>
      </div>
      <div class="status-row">
        <span class="status-label">Units</span>
        <span class="status-val" id="unitsVal">Metric</span>
      </div>
      <div class="status-row" id="swimRow" style="display:none">
        <span class="status-label">🏊 Swim pace</span>
        <span class="status-val" id="swimVal">—</span>
      </div>
      <div class="status-row" id="bikeRow" style="display:none">
        <span class="status-label">🚴 Bike</span>
        <span class="status-val" id="bikeVal">—</span>
      </div>
      <div class="status-row" id="runRow" style="display:none">
        <span class="status-label">🏃 Run pace</span>
        <span class="status-val" id="runVal">—</span>
      </div>
    </div>

    <div class="sites-note">
      <strong>Open on:</strong> ironman.com, challenge-family.com, or trisignup.com to use the overlay planner.
    </div>

    <button class="settings-btn" id="settingsBtn">⚙️ Settings &amp; Saved Paces</button>

    <div class="pro-bar" id="proBar">
      <span>Upgrade to Pro for nutrition timing &amp; cheat sheets</span>
      <button class="pro-btn" id="proBtn">$8/mo</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
