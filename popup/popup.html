<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightroom Web Keyboard Enhancer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>LR Keyboard Shortcuts</h1>
      <a href="../options/options.html" target="_blank" id="settings-link" title="Settings">&#9881;</a>
    </header>

    <!-- Enable/disable toggle -->
    <div id="toggle-row">
      <span id="toggle-label">Shortcuts active</span>
      <label class="switch">
        <input type="checkbox" id="enabled-toggle">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Shortcut cheat sheet -->
    <table id="cheat-sheet">
      <thead>
        <tr><th>Key</th><th>Action</th><th>Status</th></tr>
      </thead>
      <tbody id="shortcut-rows">
        <!-- Populated by popup.js -->
      </tbody>
    </table>

    <!-- Auto-advance status -->
    <div id="auto-advance-row" class="sub-row">
      <span>Auto-advance after flag/rating</span>
      <span id="auto-advance-status" class="status-chip"></span>
    </div>

    <!-- Upgrade banner -->
    <div id="upgrade-banner">
      <span>&#9733; Upgrade to Pro for cloud backup &amp; team sharing</span>
      <button id="upgrade-btn" class="btn-pro">$7/mo</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
