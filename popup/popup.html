<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homebrew Recipe Sidekick</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="header-icon">🍺</div>
    <div>
      <div class="header-title">Homebrew Recipe Sidekick</div>
      <div class="header-sub">Brewing Tools — Inline &amp; Instant</div>
    </div>
  </div>

  <div class="body">
    <div class="status-section">
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-val" id="statusVal">Active</span>
      </div>
      <div class="status-row">
        <span class="status-label">Units</span>
        <span class="status-val" id="unitsVal">Imperial</span>
      </div>
      <div class="status-row">
        <span class="status-label">Default Batch</span>
        <span class="status-val" id="batchVal">5 gal</span>
      </div>
      <div class="status-row">
        <span class="status-label">Plan</span>
        <span class="status-val" id="planVal">Free</span>
      </div>
    </div>

    <div class="sites-note">
      <strong>Active on:</strong> homebrewtalk.com &bull; brewersfriend.com
    </div>

    <button class="settings-btn" id="settingsBtn">⚙️ Settings &amp; Preferences</button>

    <div class="pro-bar" id="proBar">
      <span>Pro: water chemistry, yeast tools, recipe saving</span>
      <button class="pro-btn" id="proBtn">$5/mo</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
