<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espresso Community Intelligence</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-icon">&#9749;</div>
    <div>
      <div class="header-title">Espresso Community Intel</div>
      <div class="header-sub">r/espresso tier ratings while you shop</div>
    </div>
  </div>

  <div class="body">
    <div class="status-section">
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-val" id="statusVal">Active</span>
      </div>
      <div class="status-row">
        <span class="status-label">Active sites</span>
        <span class="status-val" id="sitesVal">3</span>
      </div>
      <div class="status-row">
        <span class="status-label">Plan</span>
        <span class="status-val" id="planVal">Free</span>
      </div>
    </div>

    <div class="sites-note">
      <strong>Supported:</strong> seattlecoffeegear.com, prima-coffee.com, clivecoffee.com
    </div>

    <button class="settings-btn" id="settingsBtn">&#9881;&#65039; Settings</button>

    <div class="pro-bar" id="proBar">
      <span>Pro: saved comparisons &amp; price alerts</span>
      <button class="pro-btn" id="proBtn">$6/mo</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
