<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proposal Template Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Proposal Template Manager</h1>
      <a href="../options/options.html" target="_blank" id="settings-link" title="Settings">&#9881;</a>
    </header>

    <div id="stats-row">
      <div class="stat-box">
        <span class="stat-num" id="stat-templates">0</span>
        <span class="stat-label">Templates</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="stat-sent">0</span>
        <span class="stat-label">Sent</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="stat-hired">0</span>
        <span class="stat-label">Hired</span>
      </div>
    </div>

    <div id="recent-section">
      <div class="section-title">Recent Proposals</div>
      <div id="recent-list">
        <div class="empty-msg">No proposals logged yet.</div>
      </div>
    </div>

    <div id="actions">
      <a href="../options/options.html" target="_blank" class="action-btn">
        &#43; Manage Templates
      </a>
      <a href="../options/options.html?tab=proposals" target="_blank" class="action-btn action-btn-outline">
        &#128202; View Dashboard
      </a>
    </div>

    <div id="upgrade-banner" style="display:none">
      <span>&#9733; Upgrade to Pro — unlimited templates &amp; win-rate analytics</span>
      <button id="upgrade-btn" class="btn-pro">$9/mo</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
