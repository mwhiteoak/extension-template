<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seed Catalog Companion Planner</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="header-icon">🌱</div>
    <div>
      <div class="header-title">Seed Catalog Companion</div>
      <div class="header-sub">Personalized Planting Dates — Inline</div>
    </div>
  </div>

  <div class="body">
    <div class="status-section">
      <div class="status-row">
        <span class="status-label">ZIP Code</span>
        <span class="status-val" id="zipVal">Not set</span>
      </div>
      <div class="status-row">
        <span class="status-label">USDA Zone</span>
        <span class="status-val" id="zoneVal">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">Last Spring Frost</span>
        <span class="status-val" id="lsfVal">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">First Fall Frost</span>
        <span class="status-val" id="fffVal">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">Plan</span>
        <span class="status-val" id="planVal">Free</span>
      </div>
    </div>

    <div class="sites-note">
      <strong>Active on:</strong> burpee.com &bull; johnnyseeds.com &bull; rareseeds.com &bull; seedsavers.org &bull; parkseed.com &bull; +3 more
    </div>

    <button class="settings-btn" id="settingsBtn">⚙️ Settings &amp; ZIP Code</button>

    <div class="pro-bar" id="proBar">
      <span>Pro: frost countdown, succession planner, multi-zone</span>
      <button class="pro-btn" id="proBtn">$5/mo</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
